<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Daisy_Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Job Tracker</title>
</head>

<body>
    <h2 class="text-3xl font-bold text-center mt-10 mb-6">
        Job Application Tracker
    </h2>

    <header class="grid grid-cols-1 md:grid-cols-3 gap-5 mx-auto px-4 py-4 max-w-4xl">

        <div class="total border rounded-xl p-5 shadow">
            <p class="text-sm font-semibold">Total</p>
            <div class="all-job text-3xl font-bold mt-2">0</div>
        </div>

        <div class="interview border rounded-xl p-5 shadow">
            <p class="text-sm font-semibold">Interview</p>
            <div class="interview-job text-3xl font-bold mt-2">0</div>
        </div>

        <div class="rejected border rounded-xl p-5 shadow">
            <p class="text-sm font-semibold">Rejected</p>
            <div class="rejected-job text-3xl font-bold mt-2">0</div>
        </div>

    </header>

    <section class="max-w-4xl mx-auto px-4 mt-6">
        <div class="flex gap-3">
            <button onclick="setActiveTab('All')" class="btn btn-primary">All</button>
            <button onclick="setActiveTab('Interview')" class="btn btn-accent">Interview</button>
            <button onclick="setActiveTab('Rejected')" class="btn btn-error">Rejected</button>
        </div>
    </section>

    <section class="job-container" id="job-container"></section>

    <script src="./js/jobs.js"></script>
    <script src="./js/app.js"></script>

</body>
</html>
